<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מילון צ'כית חכם</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/spelling.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🇨🇿 מילון צ'כית חכם 🇮🇱</h1>
            <div class="scoreboard">
                <span class="score-item correct">נכונות: <span id="correctCount">0</span></span>
                <span class="score-item wrong">שגויות: <span id="wrongCount">0</span></span>
            </div>
        </header>

        <!-- Supabase Auth UI: התחברות / הרשמה / פרופיל -->
        <div id="auth-container">
            <div id="auth-forms">
                <form id="signup-form">
                    <h3>הרשמה</h3>
                    <input type="email" id="signup-email" placeholder="Email" required />
                    <input type="password" id="signup-password" placeholder="Password" required minlength="6" />
                    <button type="submit">הרשם</button>
                </form>

                <form id="signin-form">
                    <h3>התחברות</h3>
                    <input type="email" id="signin-email" placeholder="Email" required />
                    <input type="password" id="signin-password" placeholder="Password" required />
                    <button type="submit">התחבר</button>
                </form>

                <div id="social-login">
                    <button data-provider="github" class="provider-btn">התחבר עם GitHub</button>
                    <button data-provider="google" class="provider-btn">התחבר עם Google</button>
                </div>
            </div>

            <div id="user-info" style="display:none;">
                <p id="user-email"></p>
                <button id="signout-button">התנתק</button>
            </div>

            <div id="auth-messages" aria-live="polite"></div>
        </div>

        <!-- Tabs Navigation -->
        <nav class="tabs">
            <button class="tab-btn active" onclick="showTab('dictionary')">
                📚 ניהול מילים
            </button>
            <button class="tab-btn" onclick="showTab('game')">
                🎮 משחק זיכרון
            </button>
            <button class="tab-btn" onclick="showTab('spelling')">
                ✍️ משחק איות
            </button>
        </nav>

        <!-- Tab 1: Dictionary Management -->
        <section id="dictionary" class="tab-content active">
            <!-- Search Box -->
            <div class="search-section">
                <input type="text" id="search-input" placeholder="חפש מילה בעברית או בצ'כית..." oninput="searchWord()">
                <div id="search-result" class="search-result"></div>
            </div>

            <!-- Sort Controls -->
            <div class="sort-controls">
                <label for="sort-lang">מיון לפי:</label>
                <select id="sort-lang" onchange="updateSort()">
                    <option value="czech">צ'כית</option>
                    <option value="hebrew">עברית</option>
                </select>

                <label for="sort-order">סדר:</label>
                <select id="sort-order" onchange="updateSort()">
                    <option value="asc"> עולה (A→Z)</option>
                    <option value="desc"> יורד (Z→A)</option>
                </select>
            </div>

            <!-- Add Word Form -->
            <div class="form-section">
                <h2>הוספת מילה חדשה</h2>
                <div class="form-group">
                    <input type="text" id="new-cs" placeholder="צ'כית (למשל: Dobrý den)">
                    <input type="text" id="new-he" placeholder="עברית (למשל: שלום)">
                </div>
                <button class="btn btn-primary" onclick="addWord()">
                    שמור לענן ☁️
                </button>
            </div>

            <!-- Words Table -->
            <div class="table-section">
                <table class="words-table">
                    <thead>
                        <tr>
                            <th>צ'כית</th>
                            <th>עברית</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="words-tbody">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Tab 2: Game -->
        <section id="game" class="tab-content">
            <div id="game-container">
                <!-- Dynamic game content -->
            </div>
        </section>

        <!-- Tab 3: Spelling Game -->
        <section id="spelling" class="tab-content">
            <div id="spelling-container">
                <!-- Dynamic spelling game content -->
                <div class="spelling-intro">
                    <h2>משחק איות (Word Scramble)</h2>
                    <p>יש לך 60 שניות לאיית כמה שיותר מילים נכון!</p>
                    <button class="btn btn-primary" onclick="startSpellingGame()">התחל משחק 🏁</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Modal for Editing Word -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h2>עדכון מילה</h2>
            <div class="form-group">
                <label for="edit-cs">צ'כית:</label>
                <input type="text" id="edit-cs" placeholder="צ'כית">
            </div>
            <div class="form-group">
                <label for="edit-he">עברית:</label>
                <input type="text" id="edit-he" placeholder="עברית">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="saveEditWord()">שמור שינויים</button>
                <button class="btn btn-secondary" onclick="closeEditModal()">בטל</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>

</html>
